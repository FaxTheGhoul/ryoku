<style>
* { margin:0; padding:0; box-sizing:border-box }

#bg-blur { position:fixed;inset:-20px;background-size:cover;background-position:center;z-index:0;opacity:0;transition:opacity 0.4s ease }

function _qv(k, def) { const v = _q.get(k); return (v && v !== 'undefined') ? v : def }

let BODY_BG        = _qv('bg',           '#0F172A')

// Aplicar fondo y screenshot desde el primer frame
document.body.style.background = BODY_BG
;(function _aplicarScreenshotInicial() {
  const ss = _qv('screenshot', '')
  if (!ss) return
  const div = document.getElementById('bg-blur')
  const brightness = parseFloat(_qv('brightness', '0.55'))
  const ssOpacity  = parseFloat(_qv('ssOpacity',  '0.92'))
  div.style.backgroundImage = 'url("' + ss + '")'
  div.style.filter  = 'blur(40px) brightness(' + brightness + ') saturate(0.85)'
  div.style.opacity = ssOpacity
})()

// Fases y velocidades calibradas para ~5s total
// Fase 0 (loading): ~2s a 0.008/frame@60fps = ~133 frames = ~2.2s
// Fase 1 (apertura): ~3s a 0.006/frame@60fps = ~167 frames = ~2.8s
let phase = 0
let loadProgress = 0
let openProgress = 0
let logoAngle = 0

function easeOut(t){ return 1-Math.pow(1-t,4) }

function draw(){
  window._splashRaf = requestAnimationFrame(draw)

  const W = cv.width, H = cv.height
  const cx = W/2, cy = H/2
  const R = Math.min(W,H)*0.1

  ctx.clearRect(0,0,W,H)

  if(phase===0){
    loadProgress = Math.min(loadProgress+0.004, 1)
    logoAngle += 0.018
    if(loadProgress>=1) phase=1
  }
  if(phase===1){
    openProgress = Math.min(openProgress+0.003, 1)
    logoAngle += 0.018
  }

  const p = easeOut(openProgress)

  // ── Puerta superior-izquierda ─────────────────────────────────────────────
  // Opacidad 0.82: permite que la screenshot sangre un poco por debajo
  ctx.save()
  ctx.globalAlpha = 0.82
  ctx.beginPath()
  ctx.moveTo(W, 0)
  ctx.lineTo(0 - W*p*0.9, 0 - H*p*0.9)
  ctx.lineTo(0, H)
  ctx.closePath()
  ctx.fillStyle=DOOR1_COLOR
  ctx.fill()
  ctx.globalAlpha = 1
  ctx.save(); ctx.clip()
  const g1=ctx.createLinearGradient(0,0,W*.5,H*.5)
  g1.addColorStop(0,`rgba(${ACCENT_RGB},0.07)`); g1.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=g1; ctx.fillRect(0,0,W,H)
  ctx.restore(); ctx.restore()

  // ── Puerta inferior-derecha ───────────────────────────────────────────────
  ctx.save()
  ctx.globalAlpha = 0.82
  ctx.beginPath()
  ctx.moveTo(W, 0)
  ctx.lineTo(W + W*p*0.9, H + H*p*0.9)
  ctx.lineTo(0, H)
  ctx.closePath()
  ctx.fillStyle=DOOR2_COLOR
  ctx.fill()
  ctx.globalAlpha = 1
  ctx.save(); ctx.clip()
  const g2=ctx.createLinearGradient(W,H,W*.5,H*.5)
  g2.addColorStop(0,`rgba(${ACCENT_RGB},0.05)`); g2.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H)
  ctx.restore(); ctx.restore()

  // ── Línea diagonal con gap alrededor del logo ─────────────────────────────
  const lineAlpha = phase===1 ? Math.max(0, 1-easeOut(Math.min(openProgress*2.5,1))) : 1
  if(lineAlpha>0.005){
    const lenSq=W*W+H*H
    const tProj=((cx-W)*(-W)+cy*H)/lenSq
    const gap=(R+16)/Math.sqrt(lenSq)
    ctx.save()
    ctx.strokeStyle=`rgba(${ACCENT_RGB},${lineAlpha})`
    ctx.lineWidth=1.5
    ctx.shadowColor=ACCENT_GLOW; ctx.shadowBlur=12
    ctx.lineCap='round'
    const t1=tProj-gap, t2=tProj+gap
    if(t1>0){
      ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W+t1*(-W),t1*H); ctx.stroke()
    }
    if(t2<1){
      ctx.beginPath(); ctx.moveTo(W+t2*(-W),t2*H); ctx.lineTo(0,H); ctx.stroke()
    }
    ctx.restore()
  }

  // ── Icono encima de todo ──────────────────────────────────────────────────
  if(img.complete && img.naturalWidth>0){
    ctx.save()
    ctx.translate(cx,cy); ctx.rotate(logoAngle)
    ctx.shadowColor=`rgba(${ACCENT_RGB},0.4)`; ctx.shadowBlur=18
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.clip()
    ctx.drawImage(img,-R,-R,R*2,R*2)
    ctx.restore()
    // Halo neon al abrirse
    if(phase===1 && openProgress>0.2){
      const hA=Math.min((openProgress-0.2)/0.8,1)
      ctx.save(); ctx.translate(cx,cy)
      ctx.beginPath(); ctx.arc(0,0,R+7,0,Math.PI*2)
      ctx.strokeStyle=`rgba(${ACCENT_RGB},${hA*0.5})`
      ctx.lineWidth=3; ctx.shadowColor=ACCENT_GLOW; ctx.shadowBlur=22; ctx.stroke()
      ctx.restore()
    }
  }

  // ── Barra de carga (solo en fase 0) ──────────────────────────────────────
  if(phase===0){
    const bW=Math.min(W*0.18,180), bY=cy+R+26
    ctx.fillStyle=`rgba(${ACCENT_RGB},0.15)`
    ctx.beginPath(); ctx.roundRect(cx-bW/2,bY,bW,2,1); ctx.fill()
    ctx.fillStyle=ACCENT_PRIMARY; ctx.shadowColor=ACCENT_GLOW; ctx.shadowBlur=6
    ctx.beginPath(); ctx.roundRect(cx-bW/2,bY,bW*loadProgress,2,1); ctx.fill()
    ctx.shadowBlur=0
    ctx.fillStyle=`rgba(${ACCENT_RGB},0.5)`
    ctx.font='500 10px Inter,sans-serif'; ctx.textAlign='center'
    ctx.fillText('RYOKU',cx,bY+16)
  }
}

img.onload = draw
img.onerror = draw

// Datos del tema cargados desde query params al inicio (ver bloque _q arriba)

// ── Animación de cierre ──────────────────────────────────────────────────
if (window.splashAPI && window.splashAPI.onClose) {
  window.splashAPI.onClose(() => {
    cancelAnimationFrame(window._splashRaf)
    window.splashAPI.done()
  })
}

// Actualizar colores en tiempo real cuando el renderer confirma el tema
if (window.splashAPI && window.splashAPI.onTheme) {
  window.splashAPI.onTheme(({ bg, door1, door2 }) => {
    BODY_BG     = bg
    DOOR1_COLOR = door1
    DOOR2_COLOR = door2
    document.body.style.background = bg
  })
}
</script>
</body>
