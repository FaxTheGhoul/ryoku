<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYOKU — Iniciar sesión</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0F172A;
    color: #F8FAFC;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Barra de título arrastrable */
  .titlebar {
    height: 36px;
    background: #111827;
    display: flex;
    align-items: center;
    padding: 0 12px;
    -webkit-app-region: drag;
    border-bottom: 1px solid #1e293b;
    gap: 8px;
  }
  .titlebar img { border-radius: 4px; }
  .titlebar-name { font-size: 12px; font-weight: 600; color: #CBD5E1; letter-spacing: 0.05em; }
  .titlebar-close {
    margin-left: auto;
    -webkit-app-region: no-drag;
    background: none; border: none; cursor: pointer;
    color: #64748B; padding: 4px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .titlebar-close:hover { color: #f87171; background: rgba(248,113,113,0.1); }

  /* Contenido */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100% - 36px);
    padding: 32px 40px;
    gap: 20px;
  }

  /* Logo grande */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .logo-img {
    width: 64px; height: 64px;
    border-radius: 16px;
    box-shadow: 0 0 32px rgba(96,165,250,0.25);
  }
  .logo-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #F8FAFC;
  }

  /* Separador */
  .divider {
    width: 100%;
    height: 1px;
    background: #1e293b;
  }

  /* Textos */
  .title {
    font-size: 16px;
    font-weight: 600;
    color: #F8FAFC;
    text-align: center;
  }
  .desc {
    font-size: 12px;
    color: #64748B;
    text-align: center;
    line-height: 1.6;
    max-width: 260px;
  }

  /* Botón Google */
  .google-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 10px 20px;
    color: #F8FAFC;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    max-width: 260px;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .google-btn:hover {
    background: #253347;
    border-color: #60A5FA;
  }
  .google-btn:active { transform: scale(0.98); }
  .google-btn:disabled {
    opacity: 0.5;
    cursor: default;
    transform: none;
  }

  /* Estado cargando */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .loading.visible { display: flex; }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid #334155;
    border-top-color: #60A5FA;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: #94a3b8; }

  /* Estado éxito */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .success.visible { display: flex; }
  .success-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(74,222,128,0.15);
    display: flex; align-items: center; justify-content: center;
  }
  .success-text { font-size: 14px; color: #4ade80; font-weight: 500; }

  /* Estado error */
  .error-msg {
    display: none;
    font-size: 12px;
    color: #f87171;
    text-align: center;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="titlebar">
  <img src="../assets/icon.png" width="18" height="18" class="titlebar-img" />
  <span class="titlebar-name">RYOKU</span>
  <button class="titlebar-close" id="btn-close" title="Cerrar">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<div class="content">
  <div class="logo-wrap">
    <img src="../assets/icon.png" class="logo-img" />
    <span class="logo-name">RYOKU</span>
  </div>

  <div class="divider"></div>

  <p class="title">Iniciar sesión</p>
  <p class="desc">Sincroniza tus favoritos, historial y configuración en todos tus dispositivos.</p>

  <button class="google-btn" id="btn-google">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continuar con Google
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span class="loading-text">Conectando con Google...</span>
  </div>

  <div class="success" id="success">
    <div class="success-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <span class="success-text">¡Sesión iniciada!</span>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<script>
  const btnGoogle = document.getElementById('btn-google')
  const btnClose  = document.getElementById('btn-close')
  const loading   = document.getElementById('loading')
  const success   = document.getElementById('success')
  const errorMsg  = document.getElementById('error-msg')

  btnClose.addEventListener('click', () => window.close())

  btnGoogle.addEventListener('click', async () => {
    btnGoogle.disabled = true
    loading.classList.add('visible')
    errorMsg.classList.remove('visible')

    try {
      const result = await window.authApi.openPicker()
      loading.classList.remove('visible')

      if (result && !result.error) {
        success.classList.add('visible')
        setTimeout(() => window.close(), 1200)
      } else {
        btnGoogle.disabled = false
        if (result?.error && result.error !== 'cancelled') {
          errorMsg.textContent = 'Error al conectar. Inténtalo de nuevo.'
          errorMsg.classList.add('visible')
        }
      }
    } catch(e) {
      loading.classList.remove('visible')
      btnGoogle.disabled = false
      errorMsg.textContent = 'Error inesperado. Inténtalo de nuevo.'
      errorMsg.classList.add('visible')
    }
  })
</script>
</body>
</html>
